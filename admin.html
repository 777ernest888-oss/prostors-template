<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Админка | Просторы</title>
  <script>
    (function() {
      var loaded = false;
      var tgScript = document.createElement('script');
      tgScript.src = 'https://telegram.org/js/telegram-web-app.js';
      tgScript.onload = function() { loaded = true; window.tgSdkLoaded = true; };
      tgScript.onerror = function() { console.log('[Telegram SDK] Failed to load'); };
      document.head.appendChild(tgScript);
      setTimeout(function() {
        if (!loaded) { console.log('[Telegram SDK] Timeout'); window.tgSdkLoaded = false; }
      }, 3000);
    })();
  </script>
  <style>
    :root { --primary: #3D5266; --accent: #3498DB; --bg: #F5F7FA; --card-bg: #FFFFFF; --text: #2C3E50; --text-secondary: #7F8C8D; --border: #E0E6ED; --danger: #E74C3C; --success: #27AE60; --warning: #F39C12; --radius: 12px; --shadow: 0 2px 8px rgba(0,0,0,0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); padding-bottom: 80px; min-height: 100vh; }
    .header { background: var(--primary); color: white; padding: 16px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 4px 8px; }
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; background: var(--card-bg); padding: 8px; border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto; }
    .tab { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s; white-space: nowrap; }
    .tab.active { background: var(--accent); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .object-card { background: var(--card-bg); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; box-shadow: var(--shadow); display: flex; gap: 12px; align-items: center; cursor: pointer; }
    .object-card.hidden-object { opacity: 0.5; }
    .card-thumb { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; background: var(--border); flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-address { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 4px; }
    .status-active { background: #E8F8F0; color: var(--success); }
    .status-hidden { background: #FEF5E7; color: var(--warning); }
    .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: var(--accent); color: white; border: none; border-radius: 50%; font-size: 28px; box-shadow: 0 4px 12px rgba(52,152,219,0.4); cursor: pointer; z-index: 90; display: flex; align-items: center; justify-content: center; }
    .lead-card { background: var(--card-bg); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .lead-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .lead-object { font-weight: 600; font-size: 16px; color: var(--text); }
    .lead-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-new { background: #E3F2FD; color: #1976D2; }
    .status-contacted { background: #FFF3E0; color: #F57C00; }
    .status-completed { background: #E8F5E9; color: #388E3C; }
    .status-cancelled { background: #FFEBEE; color: #D32F2F; }
    .lead-info { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .lead-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .status-btn { flex: 1; min-width: 120px; padding: 8px; border: 1px solid var(--border); background: var(--bg); border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .status-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; background: var(--card-bg); outline: none; }
    .form-textarea { resize: vertical; min-height: 150px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .photo-section { margin-bottom: 16px; }
    .photo-preview-area { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .photo-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; position: relative; border: 1px solid var(--border); }
    .photo-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: var(--danger); color: white; border: none; border-radius: 50%; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .upload-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; background: var(--card-bg); border: 1px dashed var(--accent); border-radius: 8px; color: var(--accent); font-size: 14px; cursor: pointer; margin-top: 8px; }
    .upload-btn input { display: none; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-danger { background: var(--danger); color: white; margin-top: 16px; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: var(--bg); width: 100%; max-height: 90vh; border-radius: 16px 16px 0 0; overflow-y: auto; padding: 20px; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; }
    .modal-header h2 { font-size: 20px; flex: 1; text-align: center; }
    .close-btn, .back-btn { background: none; border: none; color: var(--accent); font-size: 16px; font-weight: 600; cursor: pointer; padding: 4px 8px; }
    .close-btn { font-size: 24px; color: var(--text-secondary); }
    .status-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .toggle-option { flex: 1; padding: 10px; text-align: center; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer; background: var(--card-bg); }
    .toggle-option.selected { border-color: var(--accent); background: #EBF5FB; color: var(--accent); font-weight: 600; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 300; display: none; }
    .toast.show { display: block; animation: fadeInOut 3s ease; }
    @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    .pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
    .pin-screen h1 { font-size: 24px; margin-bottom: 8px; color: var(--primary); }
    .pin-screen p { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; }
    .pin-input { width: 200px; padding: 14px; font-size: 20px; text-align: center; border: 2px solid var(--border); border-radius: 12px; outline: none; letter-spacing: 8px; margin-bottom: 16px; }
    .pin-input:focus { border-color: var(--accent); }
    .pin-error { color: var(--danger); font-size: 13px; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>
  <div id="pinScreen" class="pin-screen" style="display:none;">
    <h1>🔐 Админ-панель</h1>
    <p>Введите PIN-код для доступа</p>
    <input type="password" id="pinInput" class="pin-input" placeholder="••••" maxlength="6" inputmode="numeric">
    <div id="pinError" class="pin-error">❌ Неверный PIN-код</div>
    <button class="btn btn-primary" style="width:200px;" onclick="checkPin()">Войти</button>
  </div>

  <div id="appContent" style="display:none;">
    <div class="header"><h1>⚙️ Админка</h1><button class="header-btn" onclick="refreshCurrentTab()">↻</button></div>
    <div class="container">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('objects')">🏢 Объекты</button>
        <button class="tab" onclick="switchTab('leads')">📩 Заявки</button>
        <button class="tab" onclick="switchTab('profile')">👤 Профиль</button>
        <button class="tab" onclick="switchTab('about')">ℹ️ Обо мне</button>
        <button class="tab" onclick="switchTab('settings')">🔒 Настройки</button>
      </div>

      <div id="tab-objects" class="tab-content active">
        <div class="loading" id="objectsLoading">Загрузка объектов...</div>
        <div id="objectsList"></div>
        <button class="fab" onclick="openCreateModal()">+</button>
      </div>

      <div id="tab-leads" class="tab-content">
        <div class="loading" id="leadsLoading">Загрузка заявок...</div>
        <div id="leadsList"></div>
      </div>

      <div id="tab-profile" class="tab-content">
        <div class="loading" id="profileLoading">Загрузка профиля...</div>
        <form id="profileForm" onsubmit="saveProfile(event)" style="display:none;">
          <div class="form-group"><label class="form-label">Имя *</label><input type="text" class="form-input" id="profileName" required></div>
          <div class="form-group"><label class="form-label">Должность</label><input type="text" class="form-input" id="profileRole"></div>
          <div class="form-group"><label class="form-label">Агентство</label><input type="text" class="form-input" id="profileAgencyName"></div>
          <div class="form-group"><label class="form-label">Адрес офиса</label><input type="text" class="form-input" id="profileAgencyAddress"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Telegram</label><input type="text" class="form-input" id="profileTelegram"></div>
            <div class="form-group"><label class="form-label">Телефон</label><input type="tel" class="form-input" id="profilePhone"></div>
          </div>
          <div class="photo-section">
            <label class="form-label">Фото</label>
            <div class="photo-preview-area" id="profilePhotoPreview"></div>
            <label class="upload-btn">📷 Выбрать фото<input type="file" accept="image/*" onchange="uploadProfilePhoto(this)"></label>
            <input type="hidden" id="profilePhotoUrl">
          </div>
          <button type="submit" class="btn btn-primary">💾 Сохранить профиль</button>
        </form>
      </div>

      <div id="tab-about" class="tab-content">
        <div class="loading" id="aboutLoading">Загрузка...</div>
        <form id="aboutForm" onsubmit="saveAboutPage(event)" style="display:none;">
          <div class="form-group"><label class="form-label">Заголовок</label><input type="text" class="form-input" id="aboutTitle"></div>
          <div class="form-group"><label class="form-label">Содержание</label><textarea class="form-textarea" id="aboutContent"></textarea></div>
          <button type="submit" class="btn btn-primary">💾 Сохранить страницу</button>
        </form>
      </div>

      <div id="tab-settings" class="tab-content">
        <div class="form-group"><label class="form-label">Текущий PIN</label><input type="password" class="form-input" id="currentPin" placeholder="Введите текущий PIN"></div>
        <div class="form-group"><label class="form-label">Новый PIN</label><input type="password" class="form-input" id="newPin" placeholder="Минимум 4 символа"></div>
        <div class="form-group"><label class="form-label">Повторите новый PIN</label><input type="password" class="form-input" id="confirmPin" placeholder="Повторите новый PIN"></div>
        <button class="btn btn-primary" onclick="changePin()">🔑 Сменить PIN-код</button>
        <p style="text-align:center;font-size:12px;color:var(--text-secondary);margin-top:16px;">После смены PIN текущая сессия будет обновлена автоматически.</p>
      </div>
    </div>

    <div class="modal-overlay" id="objectModal">
      <div class="modal-content">
        <div class="modal-header">
          <button class="back-btn" onclick="closeModal()">← Назад</button>
          <h2 id="modalTitle">Новый объект</h2>
          <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="status-toggle" id="statusToggle" style="display:none;">
          <div class="toggle-option selected" data-value="true" onclick="setStatus('true')">✅ Активен</div>
          <div class="toggle-option" data-value="false" onclick="setStatus('false')">🙈 Скрыт</div>
        </div>
        <form id="objectForm" onsubmit="saveObject(event)">
          <input type="hidden" id="objectId">
          <div class="form-group"><label class="form-label">Название *</label><input type="text" class="form-input" id="fieldName" required></div>
          <div class="form-group"><label class="form-label">Адрес *</label><input type="text" class="form-input" id="fieldAddress" required></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Район</label><input type="text" class="form-input" id="fieldDistrict"></div><div class="form-group"><label class="form-label">Метро</label><input type="text" class="form-input" id="fieldMetro"></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Цена от (млн ₽)</label><input type="number" step="0.1" class="form-input" id="fieldPriceFrom"></div><div class="form-group"><label class="form-label">Цена до (млн ₽)</label><input type="number" step="0.1" class="form-input" id="fieldPriceTo"></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Площадь от (м²)</label><input type="number" step="0.1" class="form-input" id="fieldAreaMin"></div><div class="form-group"><label class="form-label">Площадь до (м²)</label><input type="number" step="0.1" class="form-input" id="fieldAreaMax"></div></div>
          <div class="form-group"><label class="form-label">Цена за м² (₽)</label><input type="number" class="form-input" id="fieldPriceSqm"></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Комнатность</label><input type="text" class="form-input" id="fieldRooms"></div><div class="form-group"><label class="form-label">Класс</label><select class="form-select" id="fieldClass"><option value="">Выберите класс</option><option value="Эконом">Эконом</option><option value="Комфорт">Комфорт</option><option value="Бизнес">Бизнес</option><option value="Премиум">Премиум</option></select></div></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Срок сдачи (начало)</label><input type="text" class="form-input" id="fieldCompletionSoonest"></div><div class="form-group"><label class="form-label">Срок сдачи (конец)</label><input type="text" class="form-input" id="fieldCompletionAll"></div></div>
          <div class="form-group"><label class="form-label">Отделка</label><select class="form-select" id="fieldFinishing"><option value="">Выберите отделку</option><option value="Черновая">Черновая</option><option value="Предчистовая">Предчистовая</option><option value="Чистовая">Чистовая</option><option value="Под ключ">Под ключ</option></select></div>
          <div class="form-group"><label class="form-label">Статус стройки</label><select class="form-select" id="fieldStatus"><option value="">Выберите статус</option><option value="Строится">Строится</option><option value="Сдан">Сдан</option><option value="Частично сдан">Частично сдан</option></select></div>
          <div class="form-group"><label class="form-label">Описание</label><textarea class="form-textarea" id="fieldDescription"></textarea></div>
          <div class="form-group"><label class="form-label">Преимущества (через запятую)</label><input type="text" class="form-input" id="fieldFeatures"></div>
          <div class="photo-section"><label class="form-label">Главное фото *</label><div class="photo-preview-area" id="mainPhotoPreview"></div><label class="upload-btn">📷 Выбрать фото<input type="file" accept="image/*" onchange="uploadPhoto('main', this)"></label><input type="hidden" id="fieldImageMain"></div>
          <div class="photo-section"><label class="form-label">Галерея</label><div class="photo-preview-area" id="galleryPreview"></div><label class="upload-btn">🖼️ Добавить фото<input type="file" accept="image/*" multiple onchange="uploadPhoto('gallery', this)"></label><input type="hidden" id="fieldImagesGallery"></div>
          <div class="photo-section"><label class="form-label">Планировки</label><div class="photo-preview-area" id="plansPreview"></div><label class="upload-btn">📐 Добавить планировку<input type="file" accept="image/*" multiple onchange="uploadPhoto('plans', this)"></label><input type="hidden" id="fieldFloorPlansImages"></div>
          <div class="form-row"><div class="form-group"><label class="form-label">Широта</label><input type="number" step="any" class="form-input" id="fieldLat"></div><div class="form-group"><label class="form-label">Долгота</label><input type="number" step="any" class="form-input" id="fieldLng"></div></div>
          <button type="submit" class="btn btn-primary" id="saveBtn">Сохранить объект</button>
          <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deleteObject()">Удалить объект</button>
        </form>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>

  <script>
    var config = { scriptUrl: '' };
    var objects = [], leads = [], currentAgentData = {}, pagesData = {};
    var currentEditId = null, photoStore = { main: '', gallery: [], plans: [] }, currentStatus = 'true', currentTab = 'objects';
    var isAuthorized = false;
    var AGENT_ID = '';
    var AGENT_CONFIG = null;

    var tg = null;
    try {
      if (window.Telegram && window.Telegram.WebApp) {
        tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
      }
    } catch(e) { console.log('[Telegram] Init error:', e); }

    window.addEventListener('message', function(event) {
      if (event.origin !== window.location.origin) return;
      if (event.data && event.data.type === 'TELEGRAM_INIT_DATA') {
        sessionStorage.setItem('tg_initData', event.data.initData);
        if (!isAuthorized) checkAuth();
      }
    });

    document.addEventListener('DOMContentLoaded', async function() {
      try {
        await Promise.race([
          loadConfig(),
          new Promise(function(_, reject) { setTimeout(function() { reject(new Error('Config timeout')); }, 5000); })
        ]);
        var ok = await initAgent();
        if (ok) checkAuth();
      } catch (e) {
        console.error('[Init] Error:', e);
        showErrorScreen('Ошибка инициализации: ' + e.message);
      }
    });

    async function loadConfig() {
      var response = await fetch('client-config.json?v=2.0.9');
      var data = await response.json();
      config.scriptUrl = data.client.scriptUrl;
      console.log('[admin loadConfig] OK', config.scriptUrl);
    }

    async function initAgent() {
      var params = new URLSearchParams(window.location.search);
      var agentParam = params.get('agent');
      var hostname = window.location.hostname;
      try {
        if (agentParam) { AGENT_ID = agentParam; }
        // ✅ ИСПРАВЛЕНО: убраны хардкод-домены prostors.ru и github.io
        else if (hostname && hostname !== 'localhost' && hostname !== '127.0.0.1' && hostname.indexOf('storage.yandexcloud.net') === -1) {
          var r = await fetch(config.scriptUrl + '?action=resolve_agent_by_domain&domain=' + encodeURIComponent(hostname));
          var d = await r.json();
          if (d.success && d.agentId) { AGENT_ID = d.agentId; }
          else { showErrorScreen('Домен не привязан'); return false; }
        } else { showErrorScreen('Отсутствует параметр agent'); return false; }
        if (!AGENT_ID) { showErrorScreen('Агент не определён'); return false; }
        var userId = params.get('user_id') || '';
        if (!userId && tg && tg.initDataUnsafe && tg.initDataUnsafe.user) userId = tg.initDataUnsafe.user.id;
        var r2 = await fetch(config.scriptUrl + '?action=get_agent_config&agent_id=' + encodeURIComponent(AGENT_ID) + '&user_id=' + userId);
        var d2 = await r2.json();
        if (d2.success) { AGENT_CONFIG = d2.config; applyBrandConfig(AGENT_CONFIG); return true; }
        else { showErrorScreen('Ошибка: ' + d2.error); return false; }
      } catch (e) { console.error('[initAgent]', e); showErrorScreen('Ошибка подключения'); return false; }
    }

    function applyBrandConfig(c) {
      if (!c) return;
      var root = document.documentElement;
      if (c.primaryColor) root.style.setProperty('--primary', c.primaryColor);
      if (c.accentColor) root.style.setProperty('--accent', c.accentColor);
      if (c.appName) { document.title = c.appName + ' - Админка'; var h = document.querySelector('.header h1'); if (h) h.textContent = '⚙️ ' + c.appName; }
    }

    function showErrorScreen(msg) {
      document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;"><div style="font-size:48px;margin-bottom:20px;">🔒</div><h1 style="font-size:24px;margin-bottom:12px;">Доступ ограничен</h1><p style="color:#7F8C8D;margin-bottom:20px;">' + escapeHtml(msg) + '</p></div>';
    }

    function checkAuth() {
      if (sessionStorage.getItem('adminAuth') === 'true') {
        isAuthorized = true;
        showApp();
        return;
      }
      var urlParams = new URLSearchParams(window.location.search);
      var isAdminMode = urlParams.get('admin') === '1';
      var initData = getTelegramInitData();
      if (initData && !isAdminMode) {
        isAuthorized = true;
        sessionStorage.setItem('adminAuth', 'true');
        showApp();
        return;
      }
      document.getElementById('pinScreen').style.display = 'flex';
      document.getElementById('pinInput').focus();
    }

    async function checkPin() {
      var input = document.getElementById('pinInput').value.trim();
      if (!input) return;

    /* ============================================================
       УНИВЕРСАЛЬНЫЙ ПАРСЕР ДАТ
       Поддерживает: ISO 8601, DD.MM.YYYY, MM/DD/YYYY, timestamp
       Всегда возвращает корректный объект Date или null
       ============================================================ */
    function parseAnyDate(dateStr) {
      if (!dateStr) return null;
      if (dateStr instanceof Date) return isNaN(dateStr.getTime()) ? null : dateStr;
    
      var str = String(dateStr).trim();
    
      // 1. ISO 8601: 2026-07-06T16:54:00 или 2026-07-06
      if (/^\d{4}-\d{2}-\d{2}/.test(str)) {
        var d = new Date(str);
        if (!isNaN(d.getTime())) return d;
      }
    
      // 2. DD.MM.YYYY HH:MM:SS или DD.MM.YYYY
      var ruMatch = str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
      if (ruMatch) {
        var day = parseInt(ruMatch[1], 10);
        var month = parseInt(ruMatch[2], 10) - 1;
        var year = parseInt(ruMatch[3], 10);
        var hours = ruMatch[4] ? parseInt(ruMatch[4], 10) : 0;
        var minutes = ruMatch[5] ? parseInt(ruMatch[5], 10) : 0;
        var seconds = ruMatch[6] ? parseInt(ruMatch[6], 10) : 0;
        var d = new Date(year, month, day, hours, minutes, seconds);
        if (!isNaN(d.getTime())) return d;
      }
    
      // 3. Fallback: стандартный парсер JS
      var d = new Date(str);
      return isNaN(d.getTime()) ? null : d;
    }

    /* ============================================================
       ФОРМАТИРОВАНИЕ В РУССКИЙ ФОРМАТ
       Возвращает: «06 июля 2026, 16:54»
       ============================================================ */
    function formatRussianDate(dateStr) {
      var d = parseAnyDate(dateStr);
      if (!d) return '';
    
      var months = [
        'января', 'февраля', 'марта', 'апреля', 'мая', 'июня',
        'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'
      ];
    
      var day = d.getDate();
      var month = months[d.getMonth()];
      var year = d.getFullYear();
      var hours = ('0' + d.getHours()).slice(-2);
      var minutes = ('0' + d.getMinutes()).slice(-2);
    
      return day + ' ' + month + ' ' + year + ', ' + hours + ':' + minutes;
    }

      if (newP!==confirm) { showToast('⚠️ Новые PIN не совпадают'); return; }
      if (newP.length<4) { showToast('⚠️ PIN минимум 4 символа'); return; }
      // ✅ ИСПРАВЛЕНО: убрана несуществующая переменная event
      var btn = document.querySelector('button[onclick="changePin()"]');
      var ot = btn.textContent;
      btn.disabled=true;
      btn.textContent='Сохранение...';
      try { await apiCall('change_pin',{oldPin:current,newPin:newP}); showToast('✅ PIN изменён'); document.getElementById('currentPin').value=''; document.getElementById('newPin').value=''; document.getElementById('confirmPin').value=''; sessionStorage.setItem('adminPin',newP); }
      catch(e) { showToast('❌ '+e.message); }
      finally { btn.disabled=false; btn.textContent=ot; }
    }

    function escapeHtml(text) { if (!text) return ''; var div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function showToast(m) { var t=document.getElementById('toast'); t.textContent=m; t.classList.remove('show'); void t.offsetWidth; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000); }
    document.getElementById('objectModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
  </script>
</body>
</html>
